<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dabaszin&#257;t&#326;u prat&#299;bas nov&#275;rt&#275;&#353;ana &#8211; Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.5;background:#f5f1eb;color:#1a1814}
#app{max-width:860px;margin:0 auto;padding:1.25rem}

/* CARDS & LAYOUT */
.card{background:#fff;border:1px solid #d9d3c8;border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:11px}
.card.gray{background:#eee9e2}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
@media(max-width:600px){.cols{grid-template-columns:1fr}}

/* TYPOGRAPHY */
h1{font-size:22px;font-weight:600;color:#1b5454;margin-bottom:4px}
h2{font-size:17px;font-weight:500;margin-bottom:10px}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#9a9186;margin-bottom:3px}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#9a9186;display:block;margin-bottom:8px}
.sub{font-size:14px;color:#5a5448;margin-bottom:1rem}
.hint{font-size:11px;color:#9a9186;margin-top:4px}
.err{font-size:12px;color:#b71c1c;margin-top:5px;display:none}
.warn{font-size:12px;color:#7b4b00;background:#fff8e1;border:1px solid #ffb300;border-radius:5px;padding:6px 10px;margin-bottom:10px}

/* FORM */
input[type=text]{width:100%;padding:9px 11px;border:1px solid #d9d3c8;border-radius:6px;font-family:inherit;font-size:14px;background:#f5f1eb;color:#1a1814;outline:none}
input[type=text]:focus{border-color:#1b5454}
textarea{width:100%;padding:8px 10px;border:1px solid #d9d3c8;border-radius:6px;font-family:inherit;font-size:13px;background:#f5f1eb;color:#1a1814;resize:vertical;outline:none;margin-top:5px}
textarea:focus{border-color:#1b5454}

/* BUTTONS */
button{font-family:inherit;cursor:pointer;font-size:14px;border-radius:6px;border:1px solid #d9d3c8;padding:8px 14px;background:#fff;color:#5a5448;transition:all .12s}
button:hover{background:#eee9e2}
button:disabled{opacity:.3;cursor:not-allowed}
.btn-main{display:block;width:100%;padding:11px;background:#1b5454;color:#fff;border:none;font-weight:500;margin-top:12px;font-size:15px;border-radius:6px;cursor:pointer}
.btn-main:hover{background:#1f6666}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-teal{background:#1b5454;color:#fff;border-color:#1b5454}
.btn-teal:hover{background:#1f6666}
.btn-sm.sg{background:#e8f5e9;color:#1b5e20;border:1.5px solid #81c784;font-weight:600}
.btn-sm.sr{background:#ffebee;color:#8b1a1a;border:1.5px solid #ef9a9a}

/* PROGRESS DOTS */
.dots{display:flex;gap:5px;align-items:center;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.dot{height:7px;border-radius:4px;transition:all .2s;background:#d9d3c8}
.dot.done{background:#4caf50;width:8px}
.dot.cur{background:#1b5454;width:20px}
.dot.pend{width:8px}

/* WELCOME TASK LIST */
.tlist{border:1px solid #d9d3c8;border-radius:10px;overflow:hidden;margin-top:1.25rem}
.tlist-hd{padding:8px 13px;background:#eee9e2;border-bottom:1px solid #d9d3c8;font-size:12px;font-weight:600;color:#5a5448}
.trow{display:flex;gap:10px;padding:8px 13px;border-bottom:1px solid #d9d3c8;align-items:center}
.trow:last-child{border-bottom:none}
.tc{font-size:11px;color:#9a9186;min-width:22px}
.tn{font-size:13px;color:#5a5448;flex:1}
.tr-val{font-size:11px;color:#9a9186;min-width:60px;text-align:right}
.tn-wrap{flex:1;position:relative;display:flex;align-items:center;gap:5px}
.info-btn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#1b5454;color:#fff;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;border:none;padding:0;line-height:1;user-select:none;box-shadow:0 1px 4px rgba(27,84,84,.25)}
.info-btn:hover{background:#134040}
.tooltip-box{display:none;position:absolute;left:0;top:calc(100% + 6px);z-index:100;background:#1b5454;color:#fff;font-size:12px;line-height:1.5;padding:10px 13px;border-radius:8px;width:320px;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.tooltip-box.active{display:block}
.tooltip-box::before{content:"";position:absolute;top:-5px;left:14px;width:10px;height:10px;background:#1b5454;transform:rotate(45deg);border-radius:1px}
.tooltip-box[style*="bottom"]::before{top:auto;bottom:-5px;}

/* INSTRUCTION LIST */
.irow{display:flex;gap:8px;margin-bottom:7px}
.inum{font-size:11px;color:#9a9186;min-width:17px;padding-top:2px}
.itxt{font-size:13px;line-height:1.55}

/* SHARED SCORE */
.score-inline{font-size:14px;font-weight:500;color:#1b5454;margin-top:8px;display:block}

/* SCORING PANEL */
.sbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.sbtn{padding:9px 5px;border-radius:6px;border:1px solid #d9d3c8;background:#fff;color:#5a5448;font-family:inherit;font-size:13px;cursor:pointer;transition:all .12s;line-height:1.3}
.sbtn:hover{border-color:#c4bdb0}
.sbtn.sg{background:#e8f5e9;color:#1b5e20;border:1.5px solid #81c784;font-weight:600}
.sbtn.sa{background:#fff8e1;color:#7b4b00;border:1.5px solid #ffb300;font-weight:600}
.sbtn.sr{background:#ffebee;color:#8b1a1a;border:1.5px solid #ef9a9a;font-weight:600}
.rrow{display:flex;gap:8px;margin-bottom:4px}
.rrow.dim{opacity:.55}
.rlbl{font-size:12px;font-weight:500;min-width:120px;flex-shrink:0}
.rtxt{font-size:12px;color:#5a5448;line-height:1.4}
.auto-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid;margin-bottom:8px}

/* CLASSIFICATION GRID */
.class-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
.class-card{border:1.5px solid #d9d3c8;border-radius:8px;overflow:hidden;text-align:center;background:#fff}
.class-card.cc-ok{border-color:#81c784;background:#f1f9f2}
.class-card.cc-err{border-color:#ef9a9a;background:#fff3f3}
.class-icon{height:100px;display:flex;align-items:center;justify-content:center;padding:8px;}
.class-icon img{max-height:88px;max-width:88px;object-fit:contain;border-radius:4px}
.class-name{font-size:14px;font-weight:600;color:#5a5448;padding-bottom:3px}
.class-ans{font-size:11px;padding-bottom:8px}
.class-btns{display:flex;gap:6px;padding:7px;border-top:1px solid #d9d3c8}
.class-btns button{flex:1;border-radius:5px;border:1px solid #d9d3c8;font-size:13px;padding:9px 6px;background:#f5f1eb;color:#5a5448;cursor:pointer;transition:background .1s}
.class-btns button:hover{background:#e5e0da}
.class-btns button.cbtn-ok{background:#e8f5e9;color:#1b5e20;border-color:#81c784;font-weight:600}
.class-btns button.cbtn-err{background:#ffebee;color:#8b1a1a;border-color:#ef9a9a;font-weight:600}

/* SCIENCE TASK ITEMS */
.sci-item{border:1px solid #d9d3c8;border-radius:8px;margin-bottom:8px;overflow:hidden}
.sci-top{padding:9px 13px;background:#eee9e2;display:flex;gap:10px;align-items:flex-start}
.sci-q{font-size:14px;flex:1;line-height:1.45}
.sci-ans-tag{font-size:12px;color:#1b5454;font-weight:600;flex-shrink:0;padding-top:2px}
.sci-vis{padding:8px 13px;display:flex;align-items:center;justify-content:center}
.sci-btns{padding:6px 13px 9px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* OBSERVATION CHECKLIST */
.obs-scene{margin-bottom:12px;border:1.5px solid #d9d3c8;border-radius:8px;overflow:hidden}
.obs-level{border:1px solid #d9d3c8;border-radius:7px;margin-bottom:4px;padding:9px 12px;display:flex;gap:10px;align-items:flex-start;transition:background .12s,border-color .12s}
.obs-level:hover{background:#eee9e2}
.obs-level.obs-checked{background:#e8f5e9;border-color:#81c784}
.obs-level.obs-level-prompted{background:#fff8e1;border-color:#ffb300}
.obs-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#1b5454;min-width:72px;padding-top:2px;flex-shrink:0}
.obs-desc{font-size:13px;color:#5a5448;line-height:1.4;flex:1}
.obs-mark{font-size:16px;color:#4caf50;margin-left:auto;flex-shrink:0;line-height:1.4}
.obs-btns{display:flex;gap:4px;margin-top:6px}
.obs-btn{flex:1;padding:5px 4px;font-size:11px;border-radius:5px;border:1px solid #d9d3c8;background:#f5f1eb;color:#5a5448;cursor:pointer;text-align:center;font-family:inherit}
.obs-btn:hover{background:#e5e0da}
.obs-btn.lv1{background:#fff8e1;color:#7b4b00;border-color:#ffb300;font-weight:600}
.obs-btn.lv2{background:#e8f5e9;color:#1b5e20;border-color:#81c784;font-weight:600}

/* NAV */
.nav{display:flex;justify-content:space-between;gap:10px;margin-top:6px}

/* SUMMARY */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:#eee9e2;border-radius:8px;padding:12px 15px}
.stat-l{font-size:12px;color:#5a5448;margin-bottom:3px}
.stat-v{font-size:24px;font-weight:500}
.rtable{background:#fff;border:1px solid #d9d3c8;border-radius:10px;overflow:hidden;margin-bottom:1.25rem}
.rresult{display:grid;grid-template-columns:auto 1fr auto;gap:12px;padding:9px 14px;border-bottom:1px solid #d9d3c8;align-items:start}
.rresult:last-child{border-bottom:none}
.rnum{font-size:11px;color:#9a9186;padding-top:2px}
.rname{font-size:13px;font-weight:500;margin-bottom:2px}
.badge{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500;border:1px solid;white-space:nowrap}
.bg{background:#e8f5e9;color:#1b5e20;border-color:#81c784}
.ba{background:#fff8e1;color:#7b4b00;border-color:#ffb300}
.br{background:#ffebee;color:#8b1a1a;border-color:#ef9a9a}
</style>
</head>

var S = {phase:'welcome', code:'', idx:0, results:[], saved:false};

function initResults() {
  return TASKS.map(function(t) {
    var len = t.type==='classification' ? t.items.length
            : t.type==='comparison'     ? t.problems.length
            : t.type==='seasons'        ? t.seasons.length
            : t.type==='observation'    ? t.levels.length
            : t.type==='prediction'     ? t.problems.length : 0;
    return {items: Array(len).fill(null), rubric:null, note:''};
  });
}

// ══ HELPERS ════════════════════════════════════════════════════════════
function g(id) { return document.getElementById(id); }
function cc(arr) { return arr.filter(function(v){return v===true;}).length; }

function autoScore(idx) {
  var t=TASKS[idx], n=cc(S.results[idx].items);
  if (t.type==='classification') return n>=5?2:n>=3?1:0;
  if (t.type==='comparison')     return n>=3?2:n>=2?1:0;
  if (t.type==='seasons')        return n>=3?2:n>=2?1:0;
  if (t.type==='observation') {
    var sum=S.results[idx].items.reduce(function(s,v){return s+(v||0);},0);
    return sum>=5?2:sum>=2?1:0;
  }
  if (t.type==='prediction')     return n>=3?2:n>=2?1:0;
  return null;
}

function getEffectiveRubric(idx) {
  var r = S.results[idx];
  if (r.rubric !== null) return r.rubric;
  return autoScore(idx);
}

function isComplete(idx) {
  var t=TASKS[idx], r=S.results[idx];
  if (r.rubric !== null) return true;
  if (t.type === 'observation') return true;
  return r.items.every(function(v){return v!==null;});
}

function buildClassification(t, r) {
  var html='<span class="lbl">Klasific\u0113\u0161anas uzdevumi</span>';
  html+='<div class="class-grid">';
  t.items.forEach(function(item, i) {
    var v=r.items[i];
    var cls=v===true?' cc-ok':v===false?' cc-err':'';
    var ca=item.living?'Dz\u012Bvs':'Nedz\u012Bvs';
    var dc=item.living?'#4caf50':'#9a9186';
    var btns;
    if (v===null) {
      btns='<button onclick="setItem('+i+',true)">Pareizi</button><button onclick="setItem('+i+',false)">Nepareizi</button>';
    } else if (v===true) {
      btns='<button class="cbtn-ok" onclick="setItem('+i+',null)">\u2713 Pareizi</button><button onclick="setItem('+i+',false)" style="opacity:.55">Nepareizi</button>';
    } else {
      btns='<button onclick="setItem('+i+',true)" style="opacity:.55">Pareizi</button><button class="cbtn-err" onclick="setItem('+i+',null)">\u2717 Nepareizi</button>';
    }
    html+='<div class="class-card'+cls+'">'+
      '<div class="class-icon">'+((item.imgKey&&IMGS[item.imgKey])?('<img src="'+IMGS[item.imgKey]+'" style="max-height:86px;max-width:86px;object-fit:contain">'):item.emoji)+'</div>'+
      '<div class="class-name">'+item.label+'</div>'+
      '<div class="class-ans" style="color:'+dc+'">\u25CF '+ca+'</div>'+
      '<div class="class-btns">'+btns+'</div>'+

  });
  html+='</div>';
  html+='<span class="score-inline">Pareizi: <strong>'+cc(r.items)+' / '+t.items.length+'</strong></span>';

function compPhoto(vis) {
  var pairs = {
    weight:   {a:{k:'spalva',  l:'spalva'},   b:{k:'kiegeli', l:'ķieģelis'}},
    dissolve: {a:{k:'sals',    l:'sāls'},    b:{k:'akmens', l:'akmens'}},
    float:    {a:{k:'balkis',  l:'koka gabals'},b:{k:'akmens', l:'akmens'}},
    soft:     {a:{k:'vate',    l:'vate'},      b:{k:'balkis', l:'koks'}}
  };
  var p = pairs[vis]; if (!p) return '';
  function thumb(o){
    return '<div style="text-align:center;flex:1">'+
      '<img src="'+IMGS[o.k]+'" style="max-height:110px;max-width:110px;object-fit:contain;border-radius:5px">'+
      '<div style="font-size:11px;color:#5a5448;margin-top:4px">'+o.l+'</div></div>';

    thumb(p.a)+
    '<div style="font-size:13px;font-weight:700;color:#9a9186;flex-shrink:0">VS</div>'+
    thumb(p.b)+

}

function buildScoring(t, r) {
  var rv=getEffectiveRubric(S.idx);

    {val:0, lbl:'Nav sasniegts',    cls:'sr', rc:'#8b1a1a', rk:'n'}
  ];
  var allMarked=(t.type==='observation')||r.items.every(function(v){return v!==null;});
  if (allMarked && rv!==null) {
    var aOpt=opts[2-rv];

      '<p style="font-size:12px;color:#9a9186;margin-bottom:9px">Var labot ar pog\u0101m zem\u0101k.</p>';
    var btns=opts.map(function(o){
      var ac=(r.rubric!==null&&r.rubric===o.val)?' '+o.cls:'';
      return '<button class="sbtn'+ac+'" onclick="setRubric('+o.val+')">'+(r.rubric!==null&&r.rubric===o.val?'\u270E ':'')+o.lbl+'</button>';
    }).join('');
    var rubs=opts.map(function(o){
      var dim=rv===o.val?'':' dim';
      return '<div class="rrow'+dim+'"><span class="rlbl" style="color:'+o.rc+'">'+o.lbl+':</span><span class="rtxt">'+t.rub[o.rk]+'</span></div>';
    }).join('');
    return badge+'<div class="sbtns">'+btns+'</div>'+rubs;
  }
  var btns2=opts.map(function(o){
    var ac=r.rubric===o.val?' '+o.cls:'';
    return '<button class="sbtn'+ac+'" onclick="setRubric('+o.val+')">'+o.lbl+'</button>';
  }).join('');
  var riv=r.rubric!==null?r.rubric:-1;
  var rubs2=opts.map(function(o){
    var dim=riv===o.val?'':' dim';
    return '<div class="rrow'+dim+'"><span class="rlbl" style="color:'+o.rc+'">'+o.lbl+':</span><span class="rtxt">'+t.rub[o.rk]+'</span></div>';
  }).join('');
  return '<div class="sbtns">'+btns2+'</div>'+rubs2;
}

function toggleTip(e, id) {
  e.stopPropagation();
  document.querySelectorAll('.tooltip-box').forEach(function(el){if(el.id!==id)el.classList.remove('active');});
  var box=document.getElementById(id);
  box.classList.toggle('active');
  if (box.classList.contains('active')) {
    // flip upward if overflows viewport bottom
    var rect=box.getBoundingClientRect();
    if (rect.bottom > window.innerHeight - 10) {
      box.style.top='auto';
      box.style.bottom='calc(100% + 6px)';
      box.style.setProperty('--arrow-top','auto');
    } else {
      box.style.top='';
      box.style.bottom='';
    }
  }
}
document.addEventListener('click', function(){
  document.querySelectorAll('.tooltip-box').forEach(function(el){el.classList.remove('active');});
});

  return '<div>'+
    '<p class="eyebrow">Pirmsskolas izgl\u012Bt\u012Bbas monitorings \u00B7 Demo</p>'+
    '<h1>Dabaszin\u0101t\u0146u prat\u012Bbas nov\u0113rt\u0113\u0161ana</h1>'+
    '<p class="sub">Demo versija. 5 l\u012Bdz 7 gadus veci b\u0113rni. Izpildes laiks 15 l\u012Bdz 25 min.</p>'+
    '<div class="card">'+
      '<span class="lbl">B\u0113rna pseidoanonimiz\u0113tais kods</span>'+
      '<input id="codeIn" type="text" placeholder="piem\u0113ram, 2026-RIG-042" maxlength="20" onkeydown="if(event.key===\'Enter\')doStart()">'+
      '<p class="hint">Personas dati netiek v\u0101kti. Kods kalpo datu sistematiz\u0113\u0161anai.</p>'+
      '<p class="err" id="codeErr">L\u016Bdzu, ievadiet vismaz 3 simbolus.</p>'+
      '<button class="btn-main" onclick="doStart()">S\u0101kt nov\u0113rt\u0113\u0161anu</button>'+
    '</div>'+
    '<div class="tlist">'+
      '<div class="tlist-hd">Uzdevumu p\u0101rskats (Greenfield et al., 2009; Sa\u00E7kes et al., 2013; Najarian et al., 2018; Sodian et al., 1991)</div>'+
      TASKS.map(function(t){
        var tid='tt'+t.n;
        return '<div class="trow">'+
          '<span class="tc">'+t.n+'.</span>'+
          '<span class="tn-wrap">'+
            '<span class="tn">'+t.title+'</span>'+
            '<button class="info-btn" onclick="toggleTip(event,\''+tid+'\')" title="Par šo prasmi" aria-label="Par šo prasmi">i</button>'+
            '<div class="tooltip-box" id="'+tid+'">'+t.desc+'</div>'+
          '</span>'+
          '<span class="tr-val">'+t.r+'</span>'+
        '</div>';
      }).join('')+
    '</div>'+
    '<p style="font-size:11px;color:#9a9186;margin-top:8px;margin-bottom:0;line-height:1.5">'+
      '<em>r</em> \u2014 aptuvena korel\u0101cija ar v\u0113l\u0101kiem dabaszin\u0101t\u0146u sasniegumiem (Sa\u00E7kes et al., 2013; French, 2004). '+
      'At\u0161\u0137ir\u012Bb\u0101 no tekstprat\u012Bbas, dabaszin\u0101t\u0146u prat\u012Bbai nav vienas dom\u012Bnej o\u0161as met\u0101anal\u012Bzes. '+
      'Rob\u0113\u017Ev\u0113rt\u012Bbas nav emp\u012Briski valid\u0113tas, darba hipot\u0113ze pirms pilota. '+
      '* prognoz\u0113t\u0101jsp\u0113jas dati konkr\u0113tai apak\u0161prasmei nav pieejami.'+
    '</p>'+
    '</div>';
}

function renderTask() {
  var t=TASKS[S.idx], r=S.results[S.idx];
  var pd=TASKS.map(function(_,i){
    return '<div class="dot '+(i<S.idx?'done':i===S.idx?'cur':'pend')+'"></div>';
  }).join('');
  var content='';
  if (t.type==='classification') content=buildClassification(t,r);
  else if (t.type==='comparison')  content=buildComparison(t,r);
  else if (t.type==='seasons')     content=buildSeasons(t,r);
  else if (t.type==='observation') content=buildObservation(t,r);
  else if (t.type==='prediction')  content=buildPrediction(t,r);
  var instr=t.instr.map(function(ins,i){
    return '<div class="irow"><span class="inum">'+(i+1)+'.</span><span class="itxt">'+ins+'</span></div>';
  }).join('');
  var canNext=isComplete(S.idx);
  return '<div class="dots">'+pd+'</div>'+
    '<div class="cols">'+
      '<div><div class="card gray">'+
        '<p class="eyebrow">'+t.n+'. uzdevums \u00B7 '+t.dom+' \u00B7 '+t.r+'</p>'+
        '<h2>'+t.n+'. '+t.title+'</h2>'+
        '<p style="font-size:11px;color:#9a9186;margin-bottom:10px">Avots: '+t.src+'</p>'+
        '<span class="lbl">Instrukcijas pedagogam</span>'+instr+
      '</div>'+
      '<div class="card" style="margin-top:10px">'+
        '<span class="lbl">'+t.dq+'</span>'+
        '<p style="font-size:13px;color:#5a5448;line-height:1.6;margin-top:6px;margin-bottom:0">'+t.desc+'</p>'+
      '</div></div>'+
      '<div>'+
        '<div class="card">'+content+'</div>'+
        '<div class="card">'+
          '<span class="lbl">V\u0113rt\u0113jums</span>'+buildScoring(t,r)+
          '<span class="lbl" style="margin-top:10px">Pedagoga piez\u012Bmes</span>'+
          '<textarea id="noteArea" rows="2" placeholder="Neoblig\u0101ti\u2026" onchange="saveNote(this.value)"></textarea>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="nav">'+
      '<button onclick="doBack()" '+(S.idx===0?'disabled':'')+'>&#8592; Atpaka\u013C</button>'+
      '<button class="btn-main btn-teal" style="max-width:200px;margin-top:0" onclick="doNext()" '+(canNext?'':'disabled')+'>'+
        (S.idx===TASKS.length-1?'Pabeigt \u2713':'T\u0101l\u0101k \u2192')+
      '</button>'+
    '</div>';
}

function renderSummary() {
  var total=0, sas=0;
  TASKS.forEach(function(_,i){var v=getEffectiveRubric(i);if(v===null)v=0;total+=v;if(v===2)sas++;});
  var maxPts=TASKS.length*2, pct=Math.round(total/maxPts*100);
  var stats=[
    {l:'V\u0113rt\u0113jums kop\u0101',  v:total+' / '+maxPts},
    {l:'Procentile',          v:pct+'%*'},
    {l:'Sasniegts',           v:sas+' / '+TASKS.length}
  ].map(function(m){return '<div class="stat"><p class="stat-l">'+m.l+'</p><p class="stat-v">'+m.v+'</p></div>';}).join('');
  var bmap={2:['bg','Sasniegts'],1:['ba','Da\u013C\u0113ji sasniegts'],0:['br','Nav sasniegts']};
  var rows=TASKS.map(function(t,i){
    var rv=getEffectiveRubric(i); if(rv===null)rv=0;
    var b='<span class="badge '+bmap[rv][0]+'">'+bmap[rv][1]+'</span>';
    var items=S.results[i].items;
    var c=t.type==='observation'
      ? items.filter(function(v){return v!==null&&v>0;}).length
      : cc(items);
    var tot=items.length;
    var note=S.results[i].note?'<p style="font-size:12px;color:#5a5448">'+S.results[i].note+'</p>':'';
    return '<div class="rresult"><span class="rnum">'+t.n+'.</span>'+
      '<div><p class="rname">'+t.title+'</p>'+note+'</div>'+
      '<div style="text-align:right"><span style="font-size:12px;color:#9a9186">'+c+' / '+tot+'</span> '+b+'</div></div>';
  }).join('');
  var dl=(new Date()).toLocaleDateString('lv-LV');
  return '<p style="font-size:11px;color:#9a9186;margin-bottom:5px">'+S.code+' \u00B7 '+dl+'</p>'+
    '<h1 style="color:#1a1814;margin-bottom:3px">Nov\u0113rt\u0113\u0161anas rezult\u0101ti</h1>'+
    '<p class="sub">Dabaszin\u0101t\u0146u prat\u012Bba \u00B7 5\u20137 gadus veci b\u0113rni</p>'+
    '<div class="stat-grid">'+stats+'</div>'+
    '<div class="rtable">'+rows+'</div>'+
    '<p style="font-size:11px;color:#9a9186;margin-bottom:1rem">* Procentile att\u0113lo neapstr\u0101d\u0101to punktu procentu\u0101lo da\u013Cu no maksim\u0101l\u0101. Normat\u012Bvie dati v\u0113l nav pieejami.</p>'+
    (S.saved
      ? '<div style="display:flex;align-items:center;gap:9px;padding:10px 14px;background:#e8f5e9;border:1px solid #81c784;border-radius:7px;margin-bottom:10px;font-size:14px;color:#1b5e20;font-weight:500">\u2713 Rezult\u0101ti saglab\u0101ti ('+S.code+' \u00B7 '+dl+')</div>'
      : '<button class="btn-main" style="max-width:260px;margin-bottom:10px" onclick="mockSave()">Saglab\u0101t rezult\u0101tus</button>'
    )+
    '<br><button style="margin-top:8px" onclick="doReset()">Jauna nov\u0113rt\u0113\u0161ana</button>';
}

function render() {
  var el=g('app');
  if (S.phase==='welcome'){el.innerHTML=renderWelcome();return;}
  if (S.phase==='summary'){el.innerHTML=renderSummary();return;}
  el.innerHTML=renderTask();
  var ta=g('noteArea');
  if (ta) ta.value=S.results[S.idx].note||'';
}

// ══ ACTIONS ══════════════════════════════════════════════════════════
function doStart() {
  var inp=g('codeIn'), val=inp?inp.value.trim():'';
  if (val.length<3){var e=g('codeErr');if(e)e.style.display='block';return;}
  S.code=val; S.idx=0; S.results=initResults(); S.phase='task'; S.saved=false; render();
}
function doBack() { if(S.idx>0){S.idx--;render();} }
function doNext() {
  if (!isComplete(S.idx)) return;
  if (S.idx<TASKS.length-1){S.idx++;render();}
  else{S.phase='summary';render();}
}
function doReset() { S.phase='welcome'; S.saved=false; render(); }
function mockSave() { S.saved=true; render(); }

function setItem(i, val) { S.results[S.idx].items[i]=val; render(); }

function setObsLevel(level, val) {
  var r=S.results[S.idx];
  r.items[level]=(r.items[level]===val)?null:val;
  render();
}

function setRubric(val) { S.results[S.idx].rubric=val; render(); }
function saveNote(v) { S.results[S.idx].note=v; }

render();
</script>
</body>
</html>
