<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.5;background:#f5f1eb;color:#1a1814}
#app{max-width:860px;margin:0 auto;padding:1.25rem}

/* в”Ђв”Ђ CARDS & LAYOUT в”Ђв”Ђ */
.card{background:#fff;border:1px solid #d9d3c8;border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:11px}
.card.gray{background:#eee9e2}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
@media(max-width:600px){.cols{grid-template-columns:1fr}}

/* в”Ђв”Ђ TYPOGRAPHY в”Ђв”Ђ */
h1{font-size:22px;font-weight:600;color:#1b5454;margin-bottom:4px}
h2{font-size:17px;font-weight:500;margin-bottom:12px}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#9a9186;margin-bottom:3px}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#9a9186;display:block;margin-bottom:8px}
.sub{font-size:14px;color:#5a5448;margin-bottom:1rem}
.hint{font-size:12px;color:#9a9186;margin-top:4px}
.err{font-size:12px;color:#b71c1c;margin-top:5px;display:none}
.warn{font-size:12px;color:#7b4b00;background:#fff8e1;border:1px solid #ffb300;border-radius:5px;padding:6px 10px;margin-bottom:8px}

/* в”Ђв”Ђ FORM ELEMENTS в”Ђв”Ђ */
input[type=text]{width:100%;padding:9px 11px;border:1px solid #d9d3c8;border-radius:6px;font-family:inherit;font-size:14px;background:#f5f1eb;color:#1a1814;outline:none}
input[type=text]:focus{border-color:#1b5454}
textarea{width:100%;padding:8px 10px;border:1px solid #d9d3c8;border-radius:6px;font-family:inherit;font-size:13px;background:#f5f1eb;color:#1a1814;resize:vertical;outline:none;margin-top:5px}
textarea:focus{border-color:#1b5454}

/* в”Ђв”Ђ BUTTONS в”Ђв”Ђ */
button{font-family:inherit;cursor:pointer;font-size:14px;border-radius:6px;border:1px solid #d9d3c8;padding:8px 14px;background:#fff;color:#5a5448;transition:all .12s}
button:hover{background:#eee9e2}
button:disabled{opacity:.3;cursor:not-allowed}
.btn-main{display:block;width:100%;padding:11px;background:#1b5454;color:#fff;border:none;font-weight:500;margin-top:12px;font-size:15px}
.btn-main:hover{background:#1f6666}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-teal{background:#1b5454;color:#fff;border-color:#1b5454}
.btn-teal:hover{background:#1f6666}
.btn-red{background:#ffebee;color:#8b1a1a;border-color:#ef9a9a}
.btn-red:hover{background:#ffcdd2}
.age-seg{display:flex;gap:8px;margin-top:4px}
.age-opt{flex:1;text-align:center;padding:10px 8px;line-height:1.3}
.age-opt span{font-size:11px;color:#9a9186}
.age-opt.sel{background:#1b5454;color:#fff;border-color:#1b5454}
.age-opt.sel span{color:#cfe3e3}
.age-opt.sel:hover{background:#1f6666}
.pboxrow{display:inline-flex;gap:4px}
.pbox{min-width:24px;height:30px;padding:0 4px;border:1px solid #c4bdb0;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;background:#fff}
.img-ph{border:1px dashed #c4bdb0;border-radius:7px;background:#f9f7f4;padding:14px;font-size:12px;color:#9a9186;text-align:center;margin:4px 0 12px}
.wgrid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.wcard{position:relative;width:52px;height:62px;border:1px solid #c4bdb0;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:600;background:#fff}
.wcard.script{font-family:'Segoe Script','Bradley Hand','Comic Sans MS',cursive;font-style:italic;color:#1b5454}
.wtag{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:600;color:#1b5454;background:#e6f0f0;border-radius:4px;padding:1px 4px;white-space:nowrap}
.critlist{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
.critrow{font-size:13px;color:#5a5448;display:flex;align-items:center;gap:7px;cursor:pointer}
.instr-toggle{background:none;border:none;color:#1b5454;font-size:13px;font-weight:600;cursor:pointer;padding:4px 0;margin-bottom:6px;display:inline-block}
.instr-toggle:hover{text-decoration:underline}

/* в”Ђв”Ђ PROGRESS в”Ђв”Ђ */
.dots{display:flex;gap:5px;align-items:center;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.dot{height:7px;border-radius:4px;transition:all .2s;background:#d9d3c8}
.dot.done{background:#4caf50;width:8px}
.dot.cur{background:#1b5454;width:20px}
.dot.pend{width:8px}

/* в”Ђв”Ђ TASK LIST в”Ђв”Ђ */
.tlist{border:1px solid #d9d3c8;border-radius:10px;overflow:hidden;margin-top:1.25rem}
.tlist-hd{padding:8px 13px;background:#eee9e2;border-bottom:1px solid #d9d3c8;font-size:12px;font-weight:600;color:#5a5448}
.trow{display:flex;gap:10px;padding:8px 13px;border-bottom:1px solid #d9d3c8;align-items:center}
.trow:last-child{border-bottom:none}
.tc{font-size:11px;color:#9a9186;min-width:30px}
.tn{font-size:13px;color:#5a5448;flex:1}
.tr-val{font-size:11px;color:#9a9186}

/* в”Ђв”Ђ INSTRUCTION LIST в”Ђв”Ђ */
.irow{display:flex;gap:8px;margin-bottom:7px}
.inum{font-size:11px;color:#9a9186;min-width:17px;padding-top:2px}
.itxt{font-size:13px;line-height:1.55}

/* в”Ђв”Ђ LETTER GRID (task 1) в”Ђв”Ђ */
.letter-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.lbtn{width:48px;height:52px;border-radius:7px;border:1.5px solid #d9d3c8;background:#f5f1eb;font-size:22px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.lbtn:hover{border-color:#c4bdb0}
.lbtn.correct{background:#e8f5e9;border-color:#81c784;color:#1b5e20}
.lbtn.wrong{background:#f5f5f5;border-color:#e0e0e0;color:#bbb}
.score-inline{font-size:14px;font-weight:500;color:#1b5454;margin-bottom:8px}

/* в”Ђв”Ђ PHONEME WORDS (task 2) в”Ђв”Ђ */
.phword-row{margin-bottom:8px;border:1px solid #d9d3c8;border-radius:7px;overflow:hidden}
.phword-top{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#eee9e2}
.phword-txt{font-size:18px;font-weight:500;flex:1}
.phword-btn{padding:4px 10px;font-size:12px}
.phword-breakdown{font-size:15px;letter-spacing:.12em;font-weight:600;color:#1b5454;padding:6px 14px;background:#e4efef;display:none}
.phword-row.open .phword-breakdown{display:block}
.item-score-btns{display:flex;gap:6px;margin-top:0}

/* в”Ђв”Ђ RAN GRID в”Ђв”Ђ */
.ran-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.ran-cell{height:52px;border-radius:7px;border:1px solid #d9d3c8;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:#1a1814}
.ran-cell.obj{font-size:28px}
.ran-timer-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.timer-display{font-size:28px;font-weight:600;color:#1b5454;min-width:80px;font-variant-numeric:tabular-nums}
.error-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.error-count{font-size:22px;font-weight:600;color:#8b1a1a;min-width:36px}

.ran-norm{font-size:12px;color:#9a9186;margin-top:4px}

.qrow{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0ece4}
.qrow:last-child{border-bottom:none}
.qtxt{flex:1;font-size:13px;line-height:1.5;padding-top:4px}

/* в”Ђв”Ђ NONWORDS (task 6) в”Ђв”Ђ */

.sbtn{padding:9px 5px;border-radius:6px;border:1px solid #d9d3c8;background:#fff;color:#5a5448;font-family:inherit;font-size:13px;cursor:pointer;transition:all .12s;line-height:1.3}

var S = { phase:'welcome', code:'', teacherCode:'', ageGroup:'6', prep:[false,false,false,false], showInstr:false, idx:0, results:[], saved:false };
var ranTimer = null;

function initResults() {
  return TASKS.map(function(t) {
    if (t.type==='letters')  return {items:Array(letterSet(t).length).fill(null), rubric:null, note:''};
    if (t.type==='phonemes') { var wp=pick(t,'words'); return {items:Array(wp.length).fill(null), open:Array(wp.length).fill(false), listens:Array(wp.length).fill(0), rubric:null, note:''}; }
    if (t.type==='ran_bc')   return {phase:'grid', elapsed:0, startTime:0, errors:0, rubric:null, note:''};
    if (t.type==='ran_obj')  return {phase:'fam',  elapsed:0, startTime:0, errors:0, rubric:null, note:''};
    if (t.type==='print')    return {items:Array(t.qs.length).fill(null), rubric:null, note:''};
    if (t.type==='nonwords') { var wn=pick(t,'words'); return {items:Array(wn.length).fill(null), listens:Array(wn.length).fill(0), rubric:null, note:''}; }
    if (t.type==='writing') return {crit:Array(5).fill(false), rubric:null, note:''};

  });
}

// в•ђв•ђ AUTO-SCORE в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function countCorrect(items) {
  return items.filter(function(v){return v===true;}).length;
}
function autoRubric(score, hi, lo) {
  if (score >= hi) return 2;
  if (score >= lo) return 1;
  return 0;
}
function letterSet(t){ return (S.ageGroup==='5') ? t.letters5 : t.letters6; }
function pick(t,base){ return (S.ageGroup==='5') ? t[base+'5'] : t[base+'6']; }
function speak(txt){ try{ if(window.speechSynthesis){ var u=new SpeechSynthesisUtterance(txt); u.lang='lv-LV'; u.rate=0.9; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);} }catch(e){} }
function speakStory(){ var t=TASKS[S.idx]; speak(pick(t,'text')); }
function listenWord(i){ var t=TASKS[S.idx], r=S.results[S.idx]; var arr=pick(t,'words'); speak(arr[i].w); if(r.listens){ r.listens[i]=(r.listens[i]||0)+1; render(); } }
var WRITING_CRIT = ['Raksta pareizi','Raksta spoguДјrakstДЃ','Pareizs rakstДЃmrД«ka satvД“riens','Stabils piespiediens lapai','Lapu pietur ar otru roku'];
var PREP = ['Sagatavota mierД«ga, bД“rnam piemД“rota vide bez traucД“joЕЎiem faktoriem.','BД“rna vieta sagatavota blakus pedagogam; bД“rnam redzams ekrДЃns.','Sagatavoti materiДЃli: dators vai planЕЎete, drukas materiДЃls, zД«mulis.','IzvД“lД“ts bД“rnam piemД“rots laiks (no rД«ta, pД“c pastaigas vai pД“c atpЕ«tas).'];
function getEffectiveRubric(i) {
  var t = TASKS[i], r = S.results[i];
  if (t.type==='letters')  return (S.ageGroup==='5') ? autoRubric(countCorrect(r.items), 12, 7) : autoRubric(countCorrect(r.items), 18, 11);
  if (t.type==='phonemes') return autoRubric(countCorrect(r.items), 4, 2);
  if (t.type==='print')    return autoRubric(countCorrect(r.items), 4, 2);
  if (t.type==='nonwords') return autoRubric(countCorrect(r.items), 5, 3);
  if (t.type==='ran_bc') {
    if (r.rubric !== null) return r.rubric;
    if (r.phase !== 'done') return null;
    if (r.elapsed < 50 && r.errors <= 2) return 2;
    if (r.elapsed <= 75 && r.errors <= 5) return 1;
    return 0;
  }
  if (t.type==='ran_obj') {
    if (r.rubric !== null) return r.rubric;
    if (r.phase !== 'done') return null;
    if (r.elapsed < 45 && r.errors <= 2) return 2;
    if (r.elapsed <= 70 && r.errors <= 5) return 1;
    return 0;
  }
  return r.rubric;
}
function isComplete(i) {
  var t = TASKS[i], r = S.results[i];
  if (t.type==='letters'||t.type==='phonemes'||t.type==='print'||t.type==='nonwords') return true;
  if (t.type==='ran_bc'||t.type==='ran_obj') return r.phase === 'done';
  return r.rubric !== null;
}

  var dots = TASKS.map(function(_,i) {
    var c = i<S.idx?'done':i===S.idx?'cur':'pend';
    return '<div class="dot '+c+'"></div>';
  }).join('');
  var instr = t.instr.map(function(txt,i) {
    return '<div class="irow"><span class="inum">'+(i+1)+'.</span><span class="itxt">'+txt+'</span></div>';
  }).join('');
  var canNext = isComplete(S.idx);
  var nextLbl = S.idx < TASKS.length-1 ? 'NДЃkamais uzdevums' : 'Pabeigt un apskatД«t rezultДЃtus';
  var backDis = S.idx===0 ? ' disabled' : '';
  var nextDis = !canNext ? ' disabled' : '';
  var notComplete = !canNext ? '<p class="warn">IzvД“lieties vД“rtД“jumu, lai turpinДЃtu.</p>' : '';

  return '<div class="dots">'+dots+'</div>'+
    '<p class="eyebrow">'+t.n+'. uzdevums В· '+t.dom+' В· NELP r = '+t.nelp+' В· '+(S.ageGroup==='5'?'5 g.v.':'6 g.v.')+'</p>'+
    '<h2>'+t.title+'</h2>'+
    '<button class="instr-toggle" onclick="toggleInstr()">'+(S.showInstr?'в–ѕ':'в–ё')+' Pedagoga instrukcija</button>'+
    (S.showInstr ? '<div class="card gray"><span class="lbl">Pedagoga instrukcija</span>'+instr+'</div>' : '')+
    '<div class="card">'+buildStim(t, r)+'</div>'+
    '<div class="card"><span class="lbl">VД“rtД“ЕЎana</span>'+buildScoring(t, r)+'<label style="font-size:12px;color:#9a9186;display:block;margin-top:9px;margin-bottom:4px">PiezД«mes (nav obligДЃti)</label><textarea rows="2" placeholder="BrД«vs teksts..." oninput="saveNote(this.value)">'+r.note+'</textarea></div>'+
    notComplete+
    '<div class="nav"><button'+backDis+' onclick="doBack()">в†ђ AtpakaДј</button>'+
    '<button class="btn-main" style="width:auto;display:inline-block"'+nextDis+' onclick="doNext()">'+nextLbl+'</button></div>';
}

// в”Ђв”Ђ STIM builders в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function buildStim(t, r) {
  if (t.type==='letters')  return buildLetters(t, r);
  if (t.type==='phonemes') return buildPhonemes(t, r);
  if (t.type==='ran_bc')   return buildRanBC(r);
  if (t.type==='ran_obj')  return buildRanObj(t, r);
  if (t.type==='print')    return buildPrint(t, r);
  if (t.type==='nonwords') return buildNonwords(t, r);
  if (t.type==='story')    return buildStory(t);
  if (t.type==='writing')  return buildWriting(t);
  return '';
}

function buildLetters(t, r) {
  var correct = countCorrect(r.items);
  var btns = letterSet(t).map(function(l, i) {
    var state = r.items[i]===true ? 'correct' : r.items[i]===false ? 'wrong' : '';
    return '<button class="lbtn '+state+'" onclick="toggleLetter('+i+')">'+l+'</button>';
  }).join('');
  return '<span class="lbl">Burti (klikЕЎД·is = pareizs; vД“lreiz = nav nosaukts)</span>'+
    '<div class="letter-grid">'+btns+'</div>'+
    '<p class="score-inline">Pareizi nosaukti: <strong>'+correct+' / '+letterSet(t).length+'</strong></p>';
}

function buildPhonemes(t, r) {
  var words = pick(t,'words');
  var correct = countCorrect(r.items);
  var rows = words.map(function(wd, i) {
    var openCls = r.open[i] ? ' open' : '';
    var ic = r.items[i];
    var cbtn = ic===true  ? '<button class="btn-sm sg" onclick="setItem('+i+',false)">вњ“ Pareizi</button>'
             : ic===false ? '<button class="btn-sm sr" onclick="setItem('+i+',null)">вњ— Nepareizi</button>'
             : '<button class="btn-sm" onclick="setItem('+i+',true)">Pareizi</button>&nbsp;<button class="btn-sm" onclick="setItem('+i+',false)">Nepareizi</button>';
    var boxes = Array.prototype.map.call(wd.w.toUpperCase(), function(ch){return '<span class="pbox">'+ch+'</span>';}).join('');
    var lc = r.listens[i]||0;
    return '<div class="phword-row'+openCls+'">'+
      '<div class="phword-top" style="flex-wrap:wrap;gap:6px">'+
      '<span class="pboxrow">'+boxes+'</span>'+
      '<span style="font-size:11px;color:#9a9186">'+wd.n+' skaЕ†as</span>'+
      '<button class="btn-sm" onclick="listenWord('+i+')">&#128266; KlausД«ties'+(lc?' ('+lc+'&#215;)':'')+'</button>'+
      '<button class="btn-sm" onclick="togglePhOpen('+i+')">'+( r.open[i]?'AizvД“rt':'SadalД«jums')+'</button>'+
      '</div>'+
      '<div class="phword-breakdown">'+wd.b+'</div>'+
      '<div style="padding:6px 12px;background:#f9f7f4;display:flex;gap:6px;align-items:center">'+cbtn+'</div>'+
      '</div>';
  }).join('');
  return '<span class="lbl">Testuzdevuma vДЃrdi (bД“rnam rДЃda burtu kastД«tes; vДЃrdu var atskaЕ†ot)</span>'+rows+
    '<p class="score-inline" style="margin-top:8px">Pareizi: <strong>'+correct+' / '+words.length+'</strong></p>';
}

function buildRanBC(r) {
  var grid = ranBcGrid().map(function(row) {
    return row.map(function(c){return '<div class="ran-cell">'+c+'</div>';}).join('');
  }).join('');
  var gridHtml = '<div class="ran-grid">'+grid+'</div>';

  if (r.phase==='grid') {
    return '<span class="lbl">Stimulu tabula</span>'+gridHtml+
      '<button class="btn-main btn-teal" style="margin-top:4px" onclick="startRan()">SДЃkt в–¶</button>';
  }
  if (r.phase==='running') {
    startRanInterval();
    return '<span class="lbl">Stimulu tabula вЂ” mД“rД«ЕЎana notiek</span>'+gridHtml+
      '<div class="ran-timer-row">'+
      '<span style="font-size:13px;color:#5a5448">Laiks:</span>'+
      '<span class="timer-display" id="ranTimer">0.0</span>'+
      '<button class="btn-main btn-red" style="width:auto;display:inline-block;margin:0" onclick="stopRan()">Pabeigt в– </button>'+
      '</div>';
  }
  // done
  return '<span class="lbl">RezultДЃts</span>'+
    '<div class="ran-result-box">'+
    '<strong>Laiks: '+fmt(r.elapsed)+'</strong> &nbsp;В·&nbsp; KДјЕ«das: '+r.errors+
    '<br><span class="ran-norm">'+TASKS[S.idx].norm+'</span>'+
    '</div>'+
    '<div class="error-row">'+
    '<span style="font-size:13px;color:#5a5448">KДјЕ«das:</span>'+
    '<span class="error-count">'+r.errors+'</span>'+
    '<button class="btn-sm" onclick="addError()">+ KДјЕ«da</button>'+
    '<button class="btn-sm" onclick="removeError()">в€’ KДјЕ«da</button>'+
    '</div>';
}

             : '<button class="btn-sm" onclick="setItem('+i+',true)">Pareizi</button>&nbsp;<button class="btn-sm" onclick="setItem('+i+',false)">Nepareizi</button>';
    return '<div class="qrow"><div class="qtxt">'+(i+1)+'. '+q+'</div>'+cbtn+'</div>';

    return '<label class="critrow"><input type="checkbox" '+(r.crit[i]?'checked':'')+' onclick="toggleCrit('+i+')"> '+c+'</label>';

// в”Ђв”Ђ SCORING panel в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function buildScoring(t, r) {
  var isAuto = (t.type==='letters'||t.type==='phonemes'||t.type==='print'||t.type==='nonwords'||
                ((t.type==='ran_bc'||t.type==='ran_obj') && r.phase==='done'));

  // RAN not yet finished
  if ((t.type==='ran_bc'||t.type==='ran_obj') && r.phase!=='done') {
    return '<p style="font-size:13px;color:#9a9186;padding:6px 0">VД“rtД“ЕЎana tiks aprД“Д·inДЃta automДЃtiski pД“c laika mД“rД«ЕЎanas pabeigЕЎanas.</p>';
  }

  var rubricVal = isAuto ? getEffectiveRubric(S.idx) : r.rubric;

  var opts = [
    {val:2, lbl:'Sasniegts',      cls:'sg', rc:'#1b5e20', rk:'a'},
    {val:1, lbl:'DaДјД“ji sasniegts',cls:'sa', rc:'#7b4b00', rk:'p'},
    {val:0, lbl:'Nav sasniegts',  cls:'sr', rc:'#8b1a1a', rk:'n'}
  ];

  if (isAuto) {
    var opt = opts[2 - rubricVal];
    var autoMsg = (t.type==='ran_bc'||t.type==='ran_obj')
      ? 'AutomДЃtiski (laiks: '+fmt(r.elapsed)+', kДјЕ«das: '+r.errors+'): '+opt.lbl
      : 'AutomДЃtiski: '+opt.lbl;
    var badge = '<span class="auto-badge '+opt.cls+'" style="border-color:currentColor">'+autoMsg+'</span>'+
      '<p style="font-size:12px;color:#9a9186;margin-bottom:10px">Pamatojoties uz atzД«mД“tajiem atbildes elementiem. Varat labot ar pogДЃm zemДЃk.</p>';
    var btns = opts.map(function(o) {
      var ac = r.rubric!==null && r.rubric===o.val ? ' '+o.cls : '';
      return '<button class="sbtn'+ac+'" onclick="setRubric('+o.val+')">'+(r.rubric!==null&&r.rubric===o.val?'вњЋ ':'')+o.lbl+'</button>';
    }).join('');
    var rubs = opts.map(function(o) {
      var lit = rubricVal===o.val ? '' : ' dim';
      return '<div class="rrow'+lit+'"><span class="rlbl" style="color:'+o.rc+'">'+o.lbl+':</span><span class="rtxt">'+t.rub[o.rk]+'</span></div>';
    }).join('');
    return badge+'<div class="sbtns">'+btns+'</div>'+rubs;
  }

  // manual rubric
  var btns = opts.map(function(o) {
    var ac = r.rubric===o.val ? ' '+o.cls : '';
    return '<button class="sbtn'+ac+'" onclick="setRubric('+o.val+')">'+o.lbl+'</button>';
  }).join('');
  var rv = r.rubric !== null ? rubricVal : -1;
  var rubs = opts.map(function(o) {
    var lit = rv===o.val ? '' : ' dim';
    return '<div class="rrow'+lit+'"><span class="rlbl" style="color:'+o.rc+'">'+o.lbl+':</span><span class="rtxt">'+t.rub[o.rk]+'</span></div>';
  }).join('');
  return '<div class="sbtns">'+btns+'</div>'+rubs;
}

// в”Ђв”Ђ SUMMARY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderSummary() {
  var total = 0, sas = 0;
  TASKS.forEach(function(_,i) {
    var v = getEffectiveRubric(i);
    if (v===null) v=0;
    total += v;
    if (v===2) sas++;
  });
  var maxPts = TASKS.length * 2;
  var pct = Math.round(total/maxPts*100);
  var stats = [
    {l:'VД“rtД“jums kopДЃ', v:total+' / '+maxPts},
    {l:'Procentile', v:pct+'%*'},
    {l:'PilnД«bДЃ sasniegts', v:sas+' / '+TASKS.length}
  ].map(function(m) {
    return '<div class="stat"><p class="stat-l">'+m.l+'</p><p class="stat-v">'+m.v+'</p></div>';
  }).join('');

  var bmap = {2:['bg','Sasniegts'], 1:['ba','DaДјД“ji sasniegts'], 0:['br','Nav sasniegts']};
  var rows = TASKS.map(function(t,i) {
    var rv = getEffectiveRubric(i);
    if (rv===null) rv=0;
    var b = '<span class="badge '+bmap[rv][0]+'">'+bmap[rv][1]+'</span>';
    var score = '';
    var r = S.results[i];
    if (t.type==='letters'||t.type==='phonemes'||t.type==='print'||t.type==='nonwords') {
      var max = t.type==='letters'?letterSet(t).length : t.type==='phonemes'?pick(t,'words').length : t.type==='print'?t.qs.length : pick(t,'words').length;
      score = '<span style="font-size:12px;color:#9a9186">'+countCorrect(r.items)+' / '+max+'</span> ';
    } else if ((t.type==='ran_bc'||t.type==='ran_obj') && r.elapsed>0) {
      score = '<span style="font-size:12px;color:#9a9186">'+fmt(r.elapsed)+' / '+r.errors+' kДјЕ«d.</span> ';
    }
    var note = r.note ? '<p style="font-size:12px;color:#5a5448">'+r.note+'</p>' : '';
    return '<div class="rresult">'+
      '<span class="rnum">'+t.n+'.</span>'+
      '<div><p class="rname">'+t.title+'</p>'+note+'</div>'+
      '<div style="text-align:right">'+score+b+'</div>'+
      '</div>';
  }).join('');

  return '<p style="font-size:11px;color:#9a9186;margin-bottom:5px">'+S.code+' В· '+(new Date().toLocaleDateString('lv-LV'))+'</p>'+
    '<h1 style="color:#1a1814;margin-bottom:3px">NovД“rtД“ЕЎanas rezultДЃti</h1>'+
    '<p class="sub">TekstpratД«ba. 6 gadus veci bД“rni.</p>'+
    '<div class="stat-grid">'+stats+'</div>'+
    '<div class="rtable">'+rows+'</div>'+
    '<p style="font-size:11px;color:#9a9186;margin-bottom:1rem">* Procentile ЕЎobrД«d attД“lo neapstrДЃdДЃto punktu procentuДЃlo daДјu no maksimДЃlДЃ. NormatД«vie dati vД“l nav pieejami.</p>'+
    (S.saved
      ? '<div style="display:flex;align-items:center;gap:9px;padding:10px 14px;background:#e8f5e9;border:1px solid #81c784;border-radius:7px;margin-bottom:10px;font-size:14px;color:#1b5e20;font-weight:500">вњ“ RezultДЃti saglabДЃti ('+S.code+' В· '+(new Date().toLocaleDateString('lv-LV'))+')</div>'
      : '<button class="btn-main" style="max-width:260px;margin-bottom:10px" onclick="mockSave()">SaglabДЃt rezultДЃtus</button>'
    )+
    '<br><button style="margin-top:6px" onclick="doReset()">Jauna novД“rtД“ЕЎana</button>';
}

// в•ђв•ђ ACTIONS в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function mockSave() { S.saved = true; render(); }

function setAge(grp){
  var inp=g('codeIn'); if(inp) S.code=inp.value;
  var tin=g('teacherIn'); if(tin) S.teacherCode=tin.value;
  S.ageGroup=grp; render();
}

function togglePrep(i){ S.prep[i]=!S.prep[i]; render(); }
function doToIntake(){ if(S.prep.every(function(x){return x;})){ S.phase='intake'; render(); } }
function backToWelcome(){ var inp=g('codeIn'); if(inp) S.code=inp.value; var tin=g('teacherIn'); if(tin) S.teacherCode=tin.value; S.phase='welcome'; render(); }

function doStart() {
  var inp = g('codeIn');
  var val = inp ? inp.value.trim() : '';
  var tin = g('teacherIn'); if(tin) S.teacherCode = tin.value.trim();
  if (val.length < 3) { var e=g('codeErr'); if(e) e.style.display='block'; return; }
  S.code = val; S.idx = 0; S.results = initResults(); S.phase = 'task'; S.saved = false; S.showInstr = false;
  render();
}

function doBack() {
  if (S.idx > 0) { clearInterval(ranTimer); S.idx--; S.showInstr = false; render(); }
}

function doNext() {
  if (!isComplete(S.idx)) return;
  clearInterval(ranTimer);
  if (S.idx < TASKS.length-1) { S.idx++; S.showInstr = false; render(); }
  else { S.phase = 'summary'; render(); }
}

function toggleInstr() {
  S.showInstr = !S.showInstr;
  render();
}

function toggleLetter(i) {
  var r = S.results[S.idx];
  r.items[i] = r.items[i]===true ? null : true;
  render();
}

function toggleCrit(i) {
  var r = S.results[S.idx];
  r.crit[i] = !r.crit[i];
  render();
}

function togglePhOpen(i) {
  S.results[S.idx].open[i] = !S.results[S.idx].open[i];
  render();
}

function setItem(i, val) {
  S.results[S.idx].items[i] = val;
  render();
}

function setRubric(val) {
  S.results[S.idx].rubric = val;
  render();
}

function saveNote(v) { S.results[S.idx].note = v; }

function startRan() {
  var r = S.results[S.idx];
  r.phase = 'running';
  r.startTime = Date.now();
  r.elapsed = 0;
  render();
}

function startRanInterval() {
  clearInterval(ranTimer);
  ranTimer = setInterval(function() {
    var el = g('ranTimer');
    if (!el) { clearInterval(ranTimer); return; }
    var r = S.results[S.idx];
    el.textContent = ((Date.now()-r.startTime)/1000).toFixed(1);
  }, 100);
}

function stopRan() {
  clearInterval(ranTimer);
  var r = S.results[S.idx];
  r.elapsed = (Date.now()-r.startTime)/1000;
  r.phase = 'done';
  render();
}

function addError()    { S.results[S.idx].errors++; render(); }
function removeError() { if(S.results[S.idx].errors>0){S.results[S.idx].errors--;} render(); }

function famDone() {
  S.results[S.idx].phase = 'grid';
  render();
}

function doReset() { S.phase='welcome'; S.saved=false; render(); }

render();
</script>
